services:
  - type: web
    name: multi-agent-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: DATABASE_NAME
        value: agent_system
      - key: PYTHON_VERSION
        value: "3.11.11"
