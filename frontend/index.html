<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    
    <!-- Mobile Topbar -->
    <div class="topbar">
      <button id="mobile-toggle" style="background:none;border:none;color:var(--text-primary);cursor:pointer;padding:8px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div style="font-size:14px;font-weight:500;margin-left:8px;">Assistant</div>
    </div>

    <!-- Sidebar -->
    <div class="modal-overlay" id="sidebar-overlay" style="z-index:9"></div>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon"></div>
        <div class="brand-text">
          <h1>Personal Assistant</h1>
          <p>AI Core System</p>
        </div>
      </div>

      <nav class="nav-group">
        <div class="nav-label">Main</div>
        <a href="#/" class="nav-item active" data-page="dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
      </nav>

      <nav class="nav-group">
        <div class="nav-label">Productivity</div>
        <a href="#/tasks" class="nav-item" data-page="tasks">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Tasks
          <span class="nav-badge" id="badge-tasks">0</span>
        </a>
        <a href="#/calendar" class="nav-item" data-page="calendar">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </a>
        <a href="#/notes" class="nav-item" data-page="notes">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Notes
        </a>
      </nav>

      <nav class="nav-group" style="margin-top:auto">
        <div class="nav-label">AI</div>
        <a href="#/chat" class="nav-item" data-page="chat">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Terminal Chat
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="status-indicator">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Connecting...</span>
        </div>
      </div>
    </aside>

    <!-- Main Rendering Area -->
    <div class="main-wrapper">
      <div id="main-content" class="page-container">
        <!-- JS injects pages here -->
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Action</div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="services.js"></script>
  <script src="pages.js"></script>
  <script src="pages2.js"></script>
  <script src="app.js"></script>
</body>
</html>
